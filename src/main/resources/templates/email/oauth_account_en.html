<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password reset — LibreUML</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f7;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f7;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;">
          <tr>
            <td style="background:#1a1a2e;padding:32px 40px;">
              <h1 style="margin:0;color:#ffffff;font-size:24px;font-weight:700;">LibreUML</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:40px 40px 24px;">
              <h2 style="margin:0 0 16px;color:#1a1a2e;font-size:20px;">Password reset requested</h2>
              <p style="margin:0 0 16px;color:#555555;font-size:15px;line-height:1.6;">
                We received a password reset request for <strong>{{email}}</strong>, but this account
                uses GitHub or Google to sign in — it does not have a password.
              </p>
              <p style="margin:0;color:#555555;font-size:15px;line-height:1.6;">
                To access your account, sign in using the same provider you used when you registered.
              </p>
            </td>
          </tr>
          <tr>
            <td style="background:#f4f4f7;padding:20px 40px;border-top:1px solid #e8e8e8;">
              <p style="margin:0;color:#aaaaaa;font-size:12px;text-align:center;">
                &copy; 2026 LibreUML &mdash; sent to {{email}}
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
