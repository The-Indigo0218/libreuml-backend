spring:
  application:
    name: libreuml-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/libreumldb
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 900000

app:
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  oauth:
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}

logging:
  level:
    org.springframework.security: WARN
    root: info

springdoc:
  swagger-ui:
    path: /api/docs          # Swagger UI served at /api/docs
  api-docs:
    path: /api/api-docs      # OpenAPI JSON served at /api/api-docs

management:
  endpoints:
    web:
      base-path: /internal
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      # 100% sampling in development; override with a lower value in production via env var
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
